<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KKIA Control Panel</title>

<style>
:root {
    --primary: #6a11cb;
    --secondary: #2575fc;
    --accent: #00c9a7;
    --danger: #ff4d4d;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2b5876);
    color: white;
}

header {
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
}

nav {
    display: flex;
    justify-content: center;
    gap: 15px;
    background: rgba(0,0,0,0.4);
    padding: 10px;
}

nav button {
    background: transparent;
    border: 2px solid white;
    color: white;
    padding: 8px 15px;
    border-radius: 8px;
    cursor: pointer;
}

nav button:hover {
    background: white;
    color: black;
}

.page {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 12px;
    margin: 15px auto;
    max-width: 600px;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}

button.action {
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    border: none;
    color: white;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

button.action:hover {
    opacity: 0.8;
}

.log {
    max-height: 200px;
    overflow-y: auto;
    background: black;
    padding: 10px;
    font-size: 14px;
}

.badge {
    padding: 5px 10px;
    border-radius: 6px;
    background: var(--accent);
}

</style>
</head>

<body>

<header>KKIA CONTROL PANEL</header>

<nav>
<button onclick="showPage('login')">Login</button>
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('operations')">Operations</button>
<button onclick="showPage('reports')">Reports</button>
<button onclick="showPage('settings')">Settings</button>
</nav>

<!-- LOGIN -->
<div id="login" class="page active">
<div class="card">
<h2>Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button class="action" onclick="login()">Login</button>
<p id="loginMsg"></p>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<div class="card">
<h2>Dashboard</h2>
<p>Status: <span class="badge">Active</span></p>
<p>Operations Completed: <span id="opsCount">0</span></p>
</div>
</div>

<!-- OPERATIONS -->
<div id="operations" class="page">
<div class="card">
<h2>Operation Steps</h2>
<ul id="steps"></ul>
<button class="action" onclick="nextStep()">Next Step</button>
<p id="opStatus"></p>
</div>
</div>

<!-- REPORTS -->
<div id="reports" class="page">
<div class="card">
<h2>Create Report</h2>
<textarea id="reportText" placeholder="Write report..."></textarea>
<button class="action" onclick="saveReport()">Save Report</button>
<div class="log" id="reportLog"></div>
</div>
</div>

<!-- SETTINGS -->
<div id="settings" class="page">
<div class="card">
<h2>Settings</h2>
<select onchange="changeTheme(this.value)">
<option value="dark">Dark</option>
<option value="light">Light</option>
</select>
</div>
</div>

<script>
let loggedIn = false;
let stepIndex = 0;
let opsCompleted = 0;

const stepsData = [
"Locate binder",
"Secure area",
"Wear gear",
"Retrieve binder",
"Seal container",
"Document evidence"
];

function showPage(page) {
    if (!loggedIn && page !== 'login') return alert('Login first');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page).classList.add('active');
}

function login() {
    if(document.getElementById('user').value === 'admin' && document.getElementById('pass').value === 'binder123'){
        loggedIn = true;
        showPage('dashboard');
    } else {
        document.getElementById('loginMsg').textContent = 'Invalid login';
    }
}

function renderSteps() {
    const ul = document.getElementById('steps');
    ul.innerHTML = '';
    stepsData.forEach((step, i) => {
        const li = document.createElement('li');
        li.textContent = step;
        if(i < stepIndex) li.style.color = 'lime';
        ul.appendChild(li);
    });
}

function nextStep() {
    if(stepIndex < stepsData.length) {
        document.getElementById('opStatus').textContent = "Executing: " + stepsData[stepIndex];
        stepIndex++;
        renderSteps();
    } else {
        document.getElementById('opStatus').textContent = "Operation Complete";
        opsCompleted++;
        document.getElementById('opsCount').textContent = opsCompleted;
        stepIndex = 0;
        renderSteps();
    }
}

function saveReport() {
    const text = document.getElementById('reportText').value;
    if(!text) return;
    const log = document.getElementById('reportLog');
    const entry = document.createElement('div');
    entry.textContent = new Date().toLocaleString() + ": " + text;
    log.prepend(entry);
}

function changeTheme(mode) {
    if(mode === 'light') {
        document.body.style.background = '#f5f5f5';
        document.body.style.color = 'black';
    } else {
        document.body.style.background = 'linear-gradient(135deg, #1e1e2f, #2b5876)';
        document.body.style.color = 'white';
    }
}

renderSteps();
</script>

</body>
</html>
