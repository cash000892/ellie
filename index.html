<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKIA Binder Operation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: #333;
        }

        /* Top-left KKIA */
        .kkia-logo {
            position: fixed;
            top: 10px;
            left: 10px;
            font-weight: bold;
            font-size: 24px;
            color: #fff;
            background-color: rgba(0,0,0,0.5);
            padding: 8px 12px;
            border-radius: 8px;
            z-index: 1000;
            letter-spacing: 2px;
        }

        header {
            background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            text-align: center;
            padding: 30px 0;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .container {
            max-width: 450px;
            margin: 80px auto;
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: scale(1.02);
        }

        input[type="text"], input[type="password"] {
            width: 85%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 8px;
            border: 2px solid #6a11cb;
            font-size: 16px;
            transition: border 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #2575fc;
            box-shadow: 0 0 8px #2575fc;
            outline: none;
        }

        button {
            background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            margin-top: 12px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 16px;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background: linear-gradient(90deg, #2575fc 0%, #6a11cb 100%);
            transform: scale(1.05);
        }

        .hidden {
            display: none;
        }

        ul.steps {
            list-style-type: decimal;
            padding-left: 25px;
            text-align: left;
            color: #444;
        }

        #statusMessage {
            margin-top: 15px;
            font-weight: bold;
            color: #2575fc;
        }
    </style>
</head>
<body>
    <div class="kkia-logo">KKIA</div>
    <header>
        Binder Securing Operation
    </header>

    <!-- Login Form -->
    <div class="container" id="loginContainer">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button id="loginBtn">Login</button>
        <p id="loginMessage" class="hidden" style="color:red;"></p>
    </div>

    <!-- Operation Steps -->
    <div class="container hidden" id="operationContainer">
        <h2>Step-by-Step Procedure</h2>
        <ul class="steps" id="steps-list">
            <li>Identify the binder location.</li>
            <li>Ensure the area is safe and secure.</li>
            <li>Wear proper protective gear.</li>
            <li>Carefully take down the binder.</li>
            <li>Secure binder in approved container.</li>
            <li>Document the operation for audit purposes.</li>
        </ul>
        <button id="startBtn">Start Operation</button>
        <p id="statusMessage" class="hidden"></p>
    </div>

    <script>
        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginMessage = document.getElementById('loginMessage');
        const loginContainer = document.getElementById('loginContainer');
        const operationContainer = document.getElementById('operationContainer');

        // Static credentials
        const validUsername = "admin";
        const validPassword = "binder123";

        loginBtn.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            if(username === validUsername && password === validPassword) {
                loginContainer.classList.add('hidden');
                operationContainer.classList.remove('hidden');
            } else {
                loginMessage.textContent = "Invalid username or password";
                loginMessage.classList.remove('hidden');
            }
        });

        // Step-by-step operation flow
        const startBtn = document.getElementById('startBtn');
        const statusMessage = document.getElementById('statusMessage');
        const steps = document.querySelectorAll('#steps-list li');
        let currentStep = 0;

        startBtn.addEventListener('click', () => {
            if(currentStep < steps.length) {
                statusMessage.textContent = `Executing: ${steps[currentStep].textContent}`;
                statusMessage.classList.remove('hidden');
                currentStep++;
                startBtn.textContent = currentStep < steps.length ? "Next Step" : "Complete Operation";
            } else {
                statusMessage.textContent = "Operation successfully completed and binder secured.";
                startBtn.disabled = true;
            }
        });
    </script>
</body>
</html>
